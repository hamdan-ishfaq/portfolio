<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login - AIEngineer.io</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary-fixed": "#2c1600",
                      "surface-container-lowest": "#060e20",
                      "surface-container-low": "#131b2e",
                      "on-surface": "#dae2fd",
                      "surface-bright": "#31394d",
                      "outline": "#88929b",
                      "on-secondary-fixed-variant": "#004e5c",
                      "surface-container-high": "#222a3d",
                      "surface-container": "#171f33",
                      "on-tertiary-fixed-variant": "#693c00",
                      "inverse-primary": "#006591",
                      "error": "#ffb4ab",
                      "on-primary": "#00344d",
                      "inverse-surface": "#dae2fd",
                      "on-tertiary-container": "#4d2b00",
                      "on-error": "#690005",
                      "primary-container": "#0ea5e9",
                      "tertiary": "#ffb86e",
                      "inverse-on-surface": "#283044",
                      "outline-variant": "#3e4850",
                      "primary": "#89ceff",
                      "tertiary-fixed": "#ffdcbd",
                      "secondary": "#4cd7f6",
                      "background": "#0b1326",
                      "on-error-container": "#ffdad6",
                      "on-primary-fixed-variant": "#004c6e",
                      "surface-container-highest": "#2d3449",
                      "primary-fixed": "#c9e6ff",
                      "on-background": "#dae2fd",
                      "surface-dim": "#0b1326",
                      "tertiary-fixed-dim": "#ffb86e",
                      "tertiary-container": "#de8712",
                      "on-secondary": "#003640",
                      "on-secondary-container": "#00424e",
                      "secondary-container": "#03b5d3",
                      "surface": "#0b1326",
                      "secondary-fixed-dim": "#4cd7f6",
                      "secondary-fixed": "#acedff",
                      "on-primary-fixed": "#001e2f",
                      "primary-fixed-dim": "#89ceff",
                      "surface-variant": "#2d3449",
                      "error-container": "#93000a",
                      "surface-tint": "#89ceff",
                      "on-secondary-fixed": "#001f26",
                      "on-primary-container": "#003751",

              "borderRadius": {

                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"

              "spacing": {

                      "sm": "0.5rem",
                      "2xl": "4rem",
                      "lg": "1.5rem",
                      "container-max": "1200px",

                      "base": "4px"
              },
              "fontFamily": {

                      "body-base": ["Geist Sans"],

              }
            }
          }
        }

<style>
        body {
            background-color: #0f172a; /* Deep Slate Level 0 */
            background-image: 
                radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(76, 215, 246, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .glass-panel {
            background-color: rgba(30, 41, 59, 0.7); /* Slate-800 Level 1 */
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-glass {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }
        .input-glass:focus {
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 2px rgba(137, 206, 255, 0.2);
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(180deg, theme('colors.secondary') 0%, theme('colors.primary') 100%);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            transition: transform 0.2s ease, filter 0.2s ease;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-md md:p-lg text-on-surface antialiased overflow-hidden">
<!-- Atmospheric Mesh Background Elements -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-30">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary rounded-full mix-blend-screen filter blur-[128px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary rounded-full mix-blend-screen filter blur-[128px]"></div>
</div>
<main class="w-full max-w-[420px] relative z-10">
<!-- Login Card -->
<div class="glass-panel rounded-xl shadow-2xl p-xl flex flex-col gap-lg relative overflow-hidden">
<!-- Glow Accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-secondary to-primary opacity-50"></div>
<!-- Header -->
<div class="text-center space-y-sm mb-md">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-surface-container-high border border-white/5 mb-sm">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface">Admin Access</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Secure authentication required.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-md" id="loginForm" method="POST">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="input-glass w-full rounded-lg py-3 pl-10 pr-4 text-on-surface font-body-base text-body-base placeholder:text-outline-variant" id="email" name="email" placeholder="admin@aiengineer.io" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant block" for="password">Password</label>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">key</span>
<input class="input-glass w-full rounded-lg py-3 pl-10 pr-4 text-on-surface font-body-base text-body-base placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="btn-primary w-full rounded-lg py-3 px-4 font-body-base text-body-base text-on-primary font-semibold mt-sm flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Error/Rate Limit State (Hidden by default, shown for demo) -->
<div class="hidden mt-4 p-3 rounded-lg border border-error/20 bg-error-container/10 flex items-start gap-3" id="alertArea">
<span class="material-symbols-outlined text-error text-[20px] mt-0.5" style="font-variation-settings: 'FILL' 1;">warning</span>
<div>
<p class="font-body-sm text-body-sm text-error font-medium">Authentication Failed</p>
<p class="font-label-caps text-label-caps text-error/80 mt-1">Rate limited. Try again in <span id="countdown">30</span>s.</p>
</div>
</div>
</div>
<!-- Footer Note -->
<div class="mt-lg text-center">
<p class="font-code-base text-code-base text-on-surface-variant opacity-60">
                System v2.4.1 · Session ID: <span class="text-primary">a8f9-2c</span>
</p>
</div>
</main>
<script>
        // Simple demo logic for form submission and error state
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const alertArea = document.getElementById('alertArea');
            alertArea.classList.remove('hidden');
            
            let timeLeft = 30;
            const countdownEl = document.getElementById('countdown');
            
            const timer = setInterval(() => {
                timeLeft--;
                countdownEl.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    alertArea.classList.add('hidden');
                    countdownEl.textContent = "30";
                }
            }, 1000);
        });
    </script>
</body></html>
